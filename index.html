<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joel Joby Resume</title>
    <meta
      name="description"
      content="Joel Joby resume page with browser preview and direct PDF download."
    />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <!-- Replace __VERCEL_ANALYTICS_PATH__ with your Vercel project analytics path after enabling Web Analytics. -->
    <script defer src="/__VERCEL_ANALYTICS_PATH__/script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Syne:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="body">
    <main class="resume-page">
      <section class="resume-card">
        <p class="eyebrow">Resume</p>
        <h1 class="connect-w-me">My Resume</h1>
        <p class="decription-4">
          Same dark style, same green accent, just the resume content and the
          PDF viewer.
        </p>
        <div class="button-links-connect-container">
          <a
            class="connect-with-me-btn-linkdin"
            href="resume.pdf"
            target="_blank"
            rel="noreferrer"
          >
            <span class="connect-with-me-btn-insta-text">Open Resume</span>
          </a>
          <a class="connect-with-me-btn-github" href="resume.pdf" download>
            <span class="connect-with-me-btn-insta-text">Download PDF</span>
          </a>
        </div>
        <div class="viewer-shell">
          <object
            data="resume.pdf#view=FitH"
            type="application/pdf"
            width="100%"
            height="100%"
          >
            <div class="fallback">
              <p class="decription-4">
                Your browser could not embed the PDF.
              </p>
              <a
                class="connect-with-me-btn-linkdin fallback-button"
                href="resume.pdf"
                target="_blank"
                rel="noreferrer"
              >
                <span class="connect-with-me-btn-insta-text">Open resume.pdf</span>
              </a>
            </div>
          </object>
        </div>
      </section>
    </main>

    <footer class="footer-cont">
      <p class="decription-1">@ 2026 Joel. All rights reserved.</p>
      <p class="decription-1">Made with ❤️ by Joel</p>
    </footer>
  </body>
</html>
